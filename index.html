<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
}

.hero {
  height: 100vh;
  background: url('bg.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 4rem;
}

.section {
  padding: 80px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.gallery img {
  width: 250px;
  margin: 10px;
  border-radius: 15px;
}

.music-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<audio id="music" loop>
  <source src="Alanati Ramachandrudu-SenSongsMp3.Co_clip.mp3" type="audio/mp3">
</audio>

<div class="hero">
  <h1>Nagu ❤️ BrideName</h1>
</div>

<div class="section">
  <h2>Our Story</h2>
  <p>Funny love story here 😄</p>
</div>

<div class="section gallery">
  <h2>Gallery</h2>
  <img src="IMG_0640.JPG">
  <img src="IMG_0639.JPG">
</div>

<div class="section">
  <h2>Wedding Details</h2>
  <p>Date: Your Date</p>
</div>

<script>
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});

function toggleMusic(){
  const music = document.getElementById("music");
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
</html>
